<main class="max-w-5xl mx-auto px-4 sm:px-6 py-6 sm:py-8 space-y-5 sm:space-y-6">

  <!-- Encabezado de página -->
  <div class="flex items-center justify-between px-1">
    <h1 class="text-xl sm:text-2xl font-bold">Suscripciones</h1>
    <div class="hidden sm:block">
      <p-button label="Nueva" icon="pi pi-plus" routerLink="/subscriptions/new" size="small" />
    </div>
    <div class="sm:hidden">
      <a routerLink="/subscriptions/new">
        <p-button icon="pi pi-plus" [rounded]="true" size="small" />
      </a>
    </div>
  </div>

  <!-- Filtros -->
  <div class="flex gap-2 flex-wrap">
    @for (filter of filters; track filter.value) {
      <p-button
        [label]="filter.label"
        [outlined]="activeFilter() !== filter.value"
        [severity]="activeFilter() === filter.value ? 'primary' : 'secondary'"
        size="small"
        (click)="setFilter(filter.value)"
      />
    }
  </div>

  <!-- Lista -->
  @if (filtered.length === 0) {
    <div class="rounded-2xl overflow-hidden
      bg-white/60 dark:bg-slate-900/40
      backdrop-blur-2xl
      border border-white/75 dark:border-white/[0.07]
      shadow-xl shadow-slate-400/20 dark:shadow-black/40
      text-center py-16 px-6">
      <div class="w-16 h-16 rounded-2xl bg-[var(--p-primary-color)]/10 dark:bg-[var(--p-primary-color)]/20
                  flex items-center justify-center mx-auto mb-4">
        <i class="pi pi-search text-3xl text-[var(--p-primary-color)]"></i>
      </div>
      <p class="text-base font-semibold mb-1">Sin resultados</p>
      <p class="text-sm text-[var(--p-text-muted-color)]">No hay suscripciones con este filtro</p>
    </div>
  } @else {
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      @for (sub of filtered; track sub.id) {
        <app-subscription-card [subscription]="sub" (deleted)="subService.delete($event)" />
      }
    </div>
  }

</main>
